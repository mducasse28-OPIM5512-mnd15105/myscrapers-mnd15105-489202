name: Deploy materialize-v2

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'cloud_function/materialize_v2/**'
      - '.github/workflows/deploy-materialize-v2.yml'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  REGION: ${{ vars.REGION }}
  FUNCTION_NAME: materialize_v2
  FUNCTION_DIR: cloud_function/materialize_v2
  ENTRY_POINT: materialize_v2
  RUNTIME: python312
  BUCKET_NAME: ${{ vars.BUCKET_NAME }}
  STRUCTURED_PREFIX: "structured"
  RUNTIME_SA: ${{ vars.RUNTIME_SA }}
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔥 DEBUG: SHOW YOUR FILE WITH LINE NUMBERS
      - name: Show main.py with line numbers
        run: |
          nl -ba cloud_function/materialize_v2/main.py | sed -n '1,140p'

      - name: Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Verify source
        run: |
          set -euo pipefail
          echo "FUNCTION_DIR=${FUNCTION_DIR}"
          ls -la "${FUNCTION_DIR}"
          test -f "${FUNCTION_DIR}/main.py"
          test -f "${FUNCTION_DIR}/requirements.txt"

      - name: Deploy Cloud Function (Gen2)
        run: |
          set -euo pipefail
          gcloud functions deploy "${FUNCTION_NAME}" \
            --gen2 \
            --region="${REGION}" \
            --runtime="${RUNTIME}" \
            --source="${FUNCTION_DIR}" \
            --entry-point="${ENTRY_POINT}" \
            --trigger-http \
            --allow-unauthenticated \
            --set-env-vars="GCS_BUCKET=${BUCKET_NAME},STRUCTURED_PREFIX=${STRUCTURED_PREFIX}"
